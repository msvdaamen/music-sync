name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check-app:
    name: App — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test --run

  check-backend:
    name: Backend — Lint, Format & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check

      - name: Test
        run: bun run test --run
